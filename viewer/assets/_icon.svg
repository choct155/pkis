<?xml version="1.0" encoding="UTF-8"?>
<!-- Legacy / fallback square icon: dark background + brain, composited inline
     (rsvg-convert won't pull an external <image href> SVG). Keep the brain group
     in sync with _brain.svg. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.46" r="0.65">
