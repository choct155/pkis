# PKIS reverse proxy for the workstation (public via the existing Cloudflare Tunnel).
# Cloudflare terminates TLS at its edge, so nginx serves plain HTTP on 127.0.0.1:8080.
#
# Right now gunicorn (127.0.0.1:5001) serves /app/ itself (see serve_app in app.py),
# so this nginx front is OPTIONAL — an optimization / the "proper" setup you asked for.
#
# To apply (needs sudo):
#   sudo apt-get install -y nginx
#   sudo cp deploy/nginx-pkis.conf /etc/nginx/sites-available/pkis
#   sudo ln -sf /etc/nginx/sites-available/pkis /etc/nginx/sites-enabled/pkis
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl enable --now nginx
#
# Then point the tunnel at nginx instead of gunicorn — in ~/.cloudflared/config.yml:
#     - hostname: pkis.clowderpack.dev
#       service: http://127.0.0.1:8080      # was http://127.0.0.1:5001
#   systemctl --user restart ptis-cloudflared.service

server {
    listen 127.0.0.1:8080;
    server_name pkis.clowderpack.dev;
    client_max_body_size 200M;   # matches app.py MAX_CONTENT_LENGTH (200MB uploads)

    # Built viewer SPA — served straight from disk (faster than proxying to gunicorn).
    location = /app { return 301 /app/; }
    location /app/ {
        alias /home/choct155/projects/pkis/viewer/app/dist/;
        try_files $uri $uri/ /app/index.html;   # SPA fallback for client-side routes
    }

    # Everything else (/pkis-api, /mcp, /.well-known/*, /docs, viz assets, auth) → gunicorn.
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # so the app knows it's HTTPS behind CF
        proxy_read_timeout 120s;                     # matches gunicorn --timeout 120
    }
}
