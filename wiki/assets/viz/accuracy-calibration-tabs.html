<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaling Accuracy Estimation — Silver/Gold, Covariance, PPI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080a;--bg2:#111820;--border:#1e2d3d;--amber:#e8a045;--text:#c8d6e5;--text-dim:#5a7a94;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
.tab-nav{
  display:flex;align-items:stretch;height:46px;background:var(--bg);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
}
.tab-btn{
  background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);
  font-family:var(--mono);font-size:12px;letter-spacing:.03em;padding:0 20px;cursor:pointer;
  transition:color .15s,background .15s,border-color .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text);background:var(--bg2);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-frames{position:absolute;top:46px;left:0;right:0;bottom:0;}
.tab-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:var(--bg);}
.tab-frame.active{display:block;}
@media(max-width:600px){.tab-btn{padding:0 12px;font-size:11px;}}
</style>
</head>
<body>
<div class="tab-nav">
  <button class="tab-btn active" data-tab="t1" onclick="switchTab('t1')">1 · Silver/Gold Calibration</button>
  <button class="tab-btn" data-tab="t2" onclick="switchTab('t2')">2 · Covariance &amp; the Dirichlet</button>
  <button class="tab-btn" data-tab="t3" onclick="switchTab('t3')">3 · PPI</button>
</div>
<div class="tab-frames">
  <!-- Tab 1 is the PRISTINE explainer, loaded as-is (so any edit to it shows here automatically). -->
  <iframe id="t1" class="tab-frame active" src="accuracy-calibration-explainer.html" title="Silver/Gold Calibration"></iframe>
  <!-- Tabs 2 & 3 lazy-load on first open, so their canvases size to the real viewport. -->
  <iframe id="t2" class="tab-frame" data-src="accuracy-calibration-tab2-dirichlet.html" title="Covariance and the Dirichlet"></iframe>
  <iframe id="t3" class="tab-frame" data-src="accuracy-calibration-tab3-ppi.html" title="PPI"></iframe>
</div>
<script>
function switchTab(id){
  document.querySelectorAll(".tab-frame").forEach(f=>f.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  const f=document.getElementById(id);
  if(!f.src && f.dataset.src) f.src=f.dataset.src;   // lazy-load on first show
  f.classList.add("active");
}
</script>
</body>
</html>
